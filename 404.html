<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Parlons — Page introuvable</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23C4714A'/><text y='.9em' font-size='70' x='50%' text-anchor='middle' dominant-baseline='top' font-family='Georgia,serif' fill='white'>P</text></svg>"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:#FAF7F2;color:#2C1F14;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;}
    .container{max-width:480px;}
    .logo{font-family:'Playfair Display',serif;font-size:1.8rem;color:#C4714A;margin-bottom:2rem;}
    .logo span{font-style:italic;color:#A8502E;}
    .code{font-family:'Playfair Display',serif;font-size:6rem;font-weight:700;color:#E2D0B8;line-height:1;margin-bottom:.5rem;}
    h1{font-family:'Playfair Display',serif;font-size:1.8rem;color:#2C1F14;margin-bottom:.8rem;}
    h1 em{font-style:italic;color:#C4714A;}
    p{color:#7A5C42;font-size:.95rem;line-height:1.7;font-weight:300;margin-bottom:2rem;max-width:380px;margin-left:auto;margin-right:auto;}
    .btn{display:inline-block;background:#C4714A;color:white;padding:.9rem 2rem;border-radius:50px;text-decoration:none;font-weight:500;font-size:.95rem;transition:background .2s,transform .15s;box-shadow:0 4px 18px rgba(196,113,74,.35);}
    .btn:hover{background:#A8502E;transform:translateY(-2px);}
    .sub-link{display:block;margin-top:1rem;color:#B09070;font-size:.82rem;text-decoration:none;}
    .sub-link:hover{color:#C4714A;}
    .urgence{margin-top:2.5rem;padding:1rem;background:#FFF0F0;border-radius:12px;font-size:.75rem;color:#A02020;}
    .urgence a{color:#A02020;font-weight:700;}
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Par<span>lons</span></div>
    <div class="code">404</div>
    <h1>Cette page n'<em>existe pas</em>.</h1>
    <p>La page que vous recherchez est introuvable. Elle a peut-être été déplacée ou supprimée. Pas d'inquiétude — quelqu'un est là pour vous aider.</p>
    <a href="/" class="btn">Retour à l'accueil →</a>
    <a href="/#contact" class="sub-link">Nous contacter</a>
    <div class="urgence">
      🆘 En cas d'urgence : <a href="tel:3114">3114</a> · <a href="tel:15">15</a> · <a href="tel:112">112</a>
    </div>
  </div>
</body>
</html>
