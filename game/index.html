const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const W = 480, H = 320;
const GRAV = 0.45;
const JUMP = -9.5;
const S = 2;

// ─── Responsive canvas sizing ─────────────────────────────────────────────

function resizeCanvas() {
  const header   = document.getElementById('header');
  const touchCtl = document.getElementById('touch-controls');
  const hint     = document.getElementById('desktop-hint');
  const isTouch  = window.matchMedia('(pointer: coarse)').matches;

  const hdrH  = header.offsetHeight;
  const tctH  = isTouch ? 90 : 0;
  const hintH = isTouch ? 0 : (hint.offsetHeight + 6);
  const pad    = 8;

  const availW = window.innerWidth  - pad * 2;
  const availH = window.innerHeight - hdrH - tctH - hintH - pad * 2;

  const scale = Math.min(availW / W, availH / H);
  const cw = Math.floor(W * scale);
  const ch = Math.floor(H * scale);

  canvas.style.width  = cw + 'px';
  canvas.style.height = ch + 'px';
}

window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 150));
resizeCanvas();

// ─── Touch controls ───────────────────────────────────────────────────────

const touchKeys = { left: false, right: false, jump: false };

function bindBtn(id, key) {
  const el = document.getElementById(id);
  function on(e) {
    e.preventDefault();
    touchKeys[key] = true;
    el.classList.add('active');
  }
  function off(e) {
    e.preventDefault();
    touchKeys[key] = false;
    el.classList.remove('active');
  }
  el.addEventListener('touchstart', on, { passive: false });
  el.addEventListener('touchend',   off, { passive: false });
  el.addEventListener('touchcancel',off, { passive: false });
  // also support mouse for desktop testing
  el.addEventListener('mousedown', on);
  el.addEventListener('mouseup',   off);
  el.addEventListener('mouseleave',off);
}
bindBtn('btn-left',  'left');
bindBtn('btn-right', 'right');
bindBtn('btn-jump',  'jump');

// Jump on canvas tap (for quick play)
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  // tap right side = right, left side = left, top = jump
  const rect = canvas.getBoundingClientRect();
  const t = e.changedTouches[0];
  const rx = (t.clientX - rect.left) / rect.width;
  const ry = (t.clientY - rect.top)  / rect.height;
  if (ry < 0.4) touchKeys.jump = true;
  else if (rx < 0.4) touchKeys.left = true;
  else if (rx > 0.6) touchKeys.right = true;
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  touchKeys.jump = false;
  touchKeys.left = false;
  touchKeys.right = false;
}, { passive: false });

// ─── Pixel sprites ────────────────────────────────────────────────────────

function px(pixels, colors, x, y, s) {
  s = s || S;
  for (let r = 0; r < pixels.length; r++) {
    for (let c = 0; c < pixels[r].length; c++) {
      const k = pixels[r][c];
      if (!k) continue;
      ctx.fillStyle = colors[k];
      ctx.fillRect(Math.floor(x) + c*s, Math.floor(y) + r*s, s, s);
    }
  }
}

// ─── World ────────────────────────────────────────────────────────────────

const TILE_SIZE = 16;
const COLS = W / TILE_SIZE;
const ROWS = H / TILE_SIZE;

const LEVEL_MAP = [
  '000000000000000000000000000000',
  '000000000000000000000000000000',
  '000000000000000000000000000000',
  '000000000000000000000000000000',
  '000000000000000111100000000000',
  '000000000000000000000000000000',
  '000003330000000000000003330000',
  '000000000000000000000000000000',
  '000000000011110000000000000000',
  '000000000000000003330000000000',
  '111100000000000000000000001111',
  '000000000003330000000000000000',
  '000000000000000000011110000000',
  '000000000000000000000000000000',
  '033333333300000000003333333330',
  '000000000000000000000000000000',
  '000000000000003330000000000000',
  '000000000000000000000000000000',
  '222222222222222222222222222222',
  '444444444444444444444444444444',
];

function getCell(r, c) { return LEVEL_MAP[r]?.[c] ?? '2'; }
function isSolid(r, c) { return getCell(r, c) !== '0'; }

const TPAL = {
  '1': {top:'#665544', mid:'#443322', bot:'#221100', detail:'#554433'},
  '2': {top:'#4a4a4a', mid:'#333333', bot:'#222222', detail:'#444444'},
  '3': {top:'#777755', mid:'#555533', bot:'#333311', detail:'#666644'},
  '4': {top:'#441100', mid:'#330900', bot:'#220600', detail:'#551100'},
};

function drawTile(row, col) {
  const ch = getCell(row, col);
  if (ch === '0') return;
  const x = col * TILE_SIZE, y = row * TILE_SIZE;
  const p = TPAL[ch] || TPAL['2'];
  ctx.fillStyle = p.mid;
  ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
  ctx.fillStyle = p.top;
  ctx.fillRect(x, y, TILE_SIZE, 3);
  ctx.fillStyle = p.bot;
  ctx.fillRect(x, y + TILE_SIZE - 2, TILE_SIZE, 2);
  ctx.fillRect(x + TILE_SIZE - 2, y, 2, TILE_SIZE);
  ctx.fillStyle = p.bot;
  const bh = (row * 7 + col) % 2 === 0 ? 8 : 0;
  ctx.fillRect(x + TILE_SIZE/2 - 1, y + bh, 2, 2);
  ctx.fillRect(x, y + 8 - bh, TILE_SIZE, 1);
  if ((row * 3 + col * 5) % 7 === 0) {
    ctx.fillStyle = p.detail;
    ctx.fillRect(x + 5, y + 5, 6, 6);
    ctx.fillStyle = p.bot;
    ctx.fillRect(x + 6, y + 6, 4, 4);
  }
}

// ─── Physics ──────────────────────────────────────────────────────────────

function tileCollide() {
  const p = player;
  p.onGround = false;
  const lCol = Math.floor((p.x + 2) / TILE_SIZE);
  const rCol = Math.floor((p.x + p.w - 2) / TILE_SIZE);
  const bRow = Math.floor((p.y + p.h) / TILE_SIZE);
  const tRow = Math.floor(p.y / TILE_SIZE);
  const mRow = Math.floor((p.y + p.h/2) / TILE_SIZE);
  if (p.vy >= 0 && (isSolid(bRow, lCol) || isSolid(bRow, rCol))) {
    const top = bRow * TILE_SIZE;
    if (p.y + p.h > top && p.y + p.h < top + TILE_SIZE) {
      p.y = top - p.h; p.vy = 0; p.onGround = true;
    }
  }
  if (p.vy < 0 && (isSolid(tRow, lCol) || isSolid(tRow, rCol))) {
    p.y = (tRow + 1) * TILE_SIZE; p.vy = 0;
  }
  if (p.vx < 0 && isSolid(mRow, Math.floor(p.x / TILE_SIZE))) {
    p.x = (Math.floor(p.x / TILE_SIZE) + 1) * TILE_SIZE; p.vx = 0;
  }
  if (p.vx > 0 && isSolid(mRow, Math.floor((p.x + p.w) / TILE_SIZE))) {
    p.x = Math.floor((p.x + p.w) / TILE_SIZE) * TILE_SIZE - p.w; p.vx = 0;
  }
}

// ─── Particles ────────────────────────────────────────────────────────────

function spawnParts(x, y, color, count, col2) {
  for (let i = 0; i < count; i++) {
    const a = (Math.PI * 2 * i / count) + Math.random() * 0.4;
    const sp = 1.5 + Math.random() * 2.5;
    particles.push({
      x, y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp - 1.5,
      life: 1,
      color: (col2 && i % 2 === 0) ? col2 : color,
      size: 2 + Math.floor(Math.random() * 2),
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.12; p.life -= 0.035;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ─── Background ───────────────────────────────────────────────────────────

function drawBackground() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#0d0005');
  g.addColorStop(0.5, '#1a0208');
  g.addColorStop(1, '#0d0900');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // Eye of Terror moon
  ctx.fillStyle = '#330011';
  ctx.beginPath(); ctx.arc(380, 55, 34, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#660022';
  ctx.beginPath(); ctx.arc(380, 55, 26, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ff2200';
  ctx.beginPath(); ctx.arc(380, 55, 12, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ff8800'; ctx.fillRect(376, 46, 8, 18);
  ctx.fillStyle = '#ffcc00'; ctx.fillRect(378, 50, 4, 10);
  ctx.globalAlpha = 0.12 + Math.sin(frameCount * 0.04) * 0.07;
  ctx.fillStyle = '#ff2200';
  ctx.beginPath(); ctx.arc(380, 55, 55, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;

  // Cathedral silhouette
  ctx.fillStyle = '#1a0a00';
  ctx.fillRect(20, 80, 12, 130); ctx.fillRect(14, 78, 24, 8); ctx.fillRect(25, 65, 4, 20);
  ctx.fillRect(440, 90, 14, 120); ctx.fillRect(434, 88, 26, 8); ctx.fillRect(446, 72, 5, 22);
  ctx.fillRect(180, 100, 120, 110); ctx.fillRect(200, 95, 80, 12);
  ctx.fillStyle = '#0d0500';
  ctx.fillRect(190, 110, 14, 22); ctx.fillRect(220, 110, 14, 22);
  ctx.fillRect(256, 110, 14, 22); ctx.fillRect(285, 110, 14, 22);

  // Ash particles
  for (let i = 0; i < 30; i++) {
    const ax = (i * 137 + frameCount * 0.3 + i * 7) % W;
    const ay = (i * 97  + frameCount * 0.15 * (1 + i % 3)) % (H * 0.7);
    ctx.globalAlpha = 0.15 + Math.sin(frameCount * 0.05 + i) * 0.1;
    ctx.fillStyle = '#664422';
    ctx.fillRect(ax, ay, 1, 1);
  }
  ctx.globalAlpha = 1;

  // Ground hellfire
  const fg = ctx.createLinearGradient(0, H - 50, 0, H);
  fg.addColorStop(0, 'rgba(80,10,0,0)');
  fg.addColorStop(1, 'rgba(80,10,0,0.6)');
  ctx.fillStyle = fg;
  ctx.fillRect(0, H - 60, W, 60);

  // Blood drips
  ctx.fillStyle = '#660000';
  for (let i = 0; i < 6; i++) {
    const bx = 40 + i * 72, by = H - 32;
    ctx.fillRect(bx, by, 3, 10 + i % 5);
    ctx.fillRect(bx - 1, by + 10 + i % 5, 5, 3);
  }
}

// ─── Draw ─────────────────────────────────────────────────────────────────

function drawMap() {
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      drawTile(r, c);
}

function drawPlayer() {
  const p = player;
  if (p.invincible > 0 && Math.floor(p.invincible / 3) % 2 === 0) return;
  ctx.save();
  const spr = (p.onGround && Math.abs(p.vx) > 0.1) ? MARINE_RUN : MARINE_IDLE;
  if (p.dir < 0) {
    ctx.translate(Math.floor(p.x) + p.w, 0);
    ctx.scale(-1, 1);
    px(spr, MC, -Math.floor(p.x), Math.floor(p.y));
  } else {
    px(spr, MC, Math.floor(p.x), Math.floor(p.y));
  }
  ctx.restore();
}

function drawEnemies() {
  enemies.forEach(e => {
    const bob = Math.abs(Math.sin(frameCount * 0.15)) * 2;
    let spr, col;
    if (e.type === 'cultist') { spr = CULTIST; col = CC; }
    else if (e.type === 'nurgling') { spr = NURGLING; col = NC; }
    else { spr = CHAOS_MARINE; col = CHMC; }
    ctx.save();
    if (e.vx < 0) {
      ctx.translate(Math.floor(e.x) + e.w, 0);
      ctx.scale(-1, 1);
      px(spr, col, -Math.floor(e.x), Math.floor(e.y - (e.type === 'nurgling' ? 0 : bob)));
    } else {
      px(spr, col, Math.floor(e.x), Math.floor(e.y - (e.type === 'nurgling' ? 0 : bob)));
    }
    ctx.restore();
  });
}

function drawCollectibles() {
  collectibles.forEach(c => {
    if (c.collected) return;
    const bob = Math.sin(frameCount * 0.07 + c.x * 0.1) * 3;
    if (c.type === 'aquila') {
      ctx.globalAlpha = 0.25 + Math.sin(frameCount * 0.1 + c.x) * 0.12;
      ctx.fillStyle = '#ffaa00';
      ctx.fillRect(c.x - 2, c.y + bob - 2, 20, 18);
      ctx.globalAlpha = 1;
      px(AQUILA, AQC, c.x, c.y + bob);
    } else {
      ctx.globalAlpha = 0.25 + Math.sin(frameCount * 0.12 + c.x) * 0.12;
      ctx.fillStyle = '#00aaff';
      ctx.fillRect(c.x - 2, c.y + bob - 2, 18, 20);
      ctx.globalAlpha = 1;
      const sc = Object.assign({}, PC);
      if (Math.floor(frameCount / 6) % 2 === 0) [sc[1], sc[3]] = [sc[3], sc[1]];
      px(POWERCELL, sc, c.x, c.y + bob);
    }
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(Math.floor(p.x), Math.floor(p.y), p.size, p.size);
  });
  ctx.globalAlpha = 1;
}

// ─── Update ───────────────────────────────────────────────────────────────

function updatePlayer() {
  const p = player;
  const left  = keys['ArrowLeft']  || keys['a'] || keys['A'] || touchKeys.left;
  const right = keys['ArrowRight'] || keys['d'] || keys['D'] || touchKeys.right;
  const jump  = keys['ArrowUp']    || keys['z'] || keys['Z'] || keys[' '] || touchKeys.jump;

  if (left)  { p.vx -= 0.65; p.dir = -1; }
  if (right) { p.vx += 0.65; p.dir =  1; }
  p.vx *= 0.78;
  if (Math.abs(p.vx) < 0.05) p.vx = 0;
  p.vx = Math.max(-4.5, Math.min(4.5, p.vx));

  if (jump && p.onGround) {
    p.vy = JUMP;
    spawnParts(p.x + p.w/2, p.y + p.h, '#886622', 5, '#ccaa44');
  }

  p.vy = Math.min(p.vy + GRAV, 13);
  p.x += p.vx; p.y += p.vy;
  tileCollide();

  if (p.x < 0) { p.x = 0; p.vx = 0; }
  if (p.x + p.w > W) { p.x = W - p.w; p.vx = 0; }
  if (p.y > H + 30) die();
  if (p.invincible > 0) p.invincible--;
}

function updateEnemies() {
  enemies.forEach(e => {
    if (e.type === 'cultist' || e.type === 'chaosmarineL') {
      e.x += e.vx;
      if (e.x < e.startX || e.x + e.w > e.endX) e.vx *= -1;
    } else if (e.type === 'nurgling') {
      e.t = (e.t || 0) + 0.05;
      e.x += e.vx;
      e.y = e.baseY + Math.sin(e.t * 2.5) * 28;
      if (e.x < 0 || e.x + e.w > W) e.vx *= -1;
    }
  });
}

function overlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function checkCollisions() {
  const p = player;
  if (p.invincible > 0) return;
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (!overlap(p, e)) continue;
    const stompable = e.type === 'cultist' || e.type === 'nurgling';
    if (stompable && p.vy > 0 && p.y + p.h < e.y + e.h * 0.55) {
      spawnParts(e.x + e.w/2, e.y, '#cc0000', 12, '#440000');
      enemies.splice(i, 1);
      p.vy = JUMP * 0.65;
      score += (e.type === 'cultist') ? 100 : 150;
      updateUI();
    } else {
      die(); return;
    }
  }
  for (let c of collectibles) {
    if (c.collected) continue;
    const cr = {x:c.x+2, y:c.y+2, w:12, h:10};
    if (!overlap(p, cr)) continue;
    c.collected = true;
    if (c.type === 'aquila') {
      spawnParts(c.x+8, c.y+7, '#ffcc00', 14, '#ff8800');
      score += 50; aquilasCollected++;
    } else {
      spawnParts(c.x+8, c.y+8, '#44ddff', 12, '#0088cc');
      score += 250; lives = Math.min(lives + 1, 5);
    }
    updateUI();
    const totalAq = collectibles.filter(x => x.type === 'aquila').length;
    if (aquilasCollected >= totalAq) state = 'win';
  }
}

function die() {
  if (state !== 'playing') return;
  spawnParts(player.x + player.w/2, player.y + player.h/2, '#ff0000', 18, '#880000');
  lives--;
  updateUI();
  if (lives <= 0) { state = 'gameover'; }
  else { state = 'dead'; deathTimer = 90; }
}

// ─── Overlay ──────────────────────────────────────────────────────────────

function drawOverlay(title, sub) {
  ctx.fillStyle = 'rgba(0,0,0,0.72)';
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = '#aa6600'; ctx.lineWidth = 3;
  ctx.strokeRect(20, H/2 - 62, W - 40, 114);
  ctx.strokeStyle = '#661100'; ctx.lineWidth = 1;
  ctx.strokeRect(24, H/2 - 58, W - 48, 106);
  ctx.textAlign = 'center';
  ctx.font = 'bold 26px "Courier New"';
  ctx.fillStyle = '#cc8800';
  ctx.fillText(title, W/2, H/2 - 16);
  ctx.font = '12px "Courier New"';
  ctx.fillStyle = '#886622';
  ctx.fillText(sub, W/2, H/2 + 8);
  ctx.font = '11px "Courier New"';
  ctx.fillStyle = '#553311';
  ctx.fillText('[ R ] RESTART', W/2, H/2 + 32);
}

// ─── Main loop ────────────────────────────────────────────────────────────

function update() {
  frameCount++;
  if (state === 'playing') {
    updatePlayer(); updateEnemies(); checkCollisions();
  } else if (state === 'dead') {
    if (--deathTimer <= 0) {
      player.x = 40; player.y = 200;
      player.vx = 0; player.vy = 0;
      player.invincible = 70;
      state = 'playing';
    }
  }
  updateParticles();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawMap();
  drawCollectibles();
  drawParticles();
  drawEnemies();
  drawPlayer();

  // Wounds bar HUD
  ctx.fillStyle = '#1a0800';
  ctx.fillRect(4, 4, 80, 8);
  ctx.fillStyle = '#cc4400';
  ctx.fillRect(4, 4, Math.floor(80 * lives / 5), 8);
  ctx.fillStyle = '#ff6600';
  ctx.fillRect(4, 4, Math.floor(80 * lives / 5 * 0.6), 4);
  ctx.strokeStyle = '#7a3000'; ctx.lineWidth = 1;
  ctx.strokeRect(4, 4, 80, 8);
  ctx.fillStyle = '#886644';
  ctx.font = '7px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('WOUNDS', 6, 11);

  if (state === 'win') {
    drawOverlay('⚜ GLORY TO THE EMPEROR ⚜', `Kills: ${score}  Aquilas: ${aquilasCollected}`);
  } else if (state === 'gameover') {
    drawOverlay('THE EMPEROR WEEPS', `Score: ${score} — Heresy detected`);
  } else if (state === 'dead' && deathTimer > 60) {
    ctx.textAlign = 'center';
    ctx.font = 'bold 16px monospace';
    ctx.fillStyle = '#ff2200';
    ctx.globalAlpha = (deathTimer - 60) / 30;
    ctx.fillText('BY THE THRONE!', W/2, H/2);
    ctx.globalAlpha = 1;
  }
}

function loop() { update(); draw(); requestAnimationFrame(loop); }

// ─── Keyboard input ───────────────────────────────────────────────────────

window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === 'r' || e.key === 'R') initGame();
  if ([' ','ArrowUp','ArrowLeft','ArrowRight','ArrowDown'].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

// Restart on tap when game over / win
canvas.addEventListener('touchend', e => {
  if (state === 'gameover' || state === 'win') { e.preventDefault(); initGame(); }
}, { passive: false });

initGame();
loop();
</script>
</body>
